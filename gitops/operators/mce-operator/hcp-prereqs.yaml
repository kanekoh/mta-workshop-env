---
apiVersion: v1
kind: Namespace
metadata:
  name: clusters
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    cluster.open-cluster-management.io/managedCluster: local-cluster
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hcp-cluster-creator
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups: ["hypershift.openshift.io"]
    resources: ["hostedclusters", "nodepools"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hcp-cluster-creator-admin
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hcp-cluster-creator
subjects:
  - kind: Group
    name: cluster-admins
    apiGroup: rbac.authorization.k8s.io
